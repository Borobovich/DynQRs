<!DOCTYPE html>
<html lang="en">

  <body>
  <script>
    const AS_URL_BASE = "https://script.google.com/macros/s/AKfycbwZXR5UzJcYPLuU--B2ibPUob72xj2uZaVmhxs191ITLLwTSxcgdz_uDeJ8Z5DV0b-zrg/exec";
    
    var url = document.location.href;
    var k = url.substr(url.lastIndexOf("k=")+2);
    
    if(k){
      fetch(AS_URL_BASE+'?k='+k)
      .then(r => r.text())
      .then((r) => {
        console.log(r);
        //document.write(r);
        if(r){
          document.location.replace(r);
        }
      })
      .catch(err => console.log(err))
    }

  </script>
  
  <div class="lds-ring"><div></div><div></div><div></div><div></div></div>
